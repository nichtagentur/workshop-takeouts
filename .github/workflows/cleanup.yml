name: cleanup-old-takeouts

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Delete release takeouts older than 7 days
        run: |
          set -euo pipefail
          NOW=$(date -u +%s)
          REMOVED=0
          while IFS=$'\t' read -r tag created; do
            [ -n "$tag" ] || continue
            cts=$(date -u -d "$created" +%s 2>/dev/null || echo 0)
            [ "$cts" -gt 0 ] || continue
            age_days=$(( (NOW - cts) / 86400 ))
            if [ "$age_days" -ge 7 ]; then
              echo "deleting release $tag (age ${age_days}d, created $created)"
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes || true
              REMOVED=$((REMOVED + 1))
            fi
          done < <(gh release list --repo "$GITHUB_REPOSITORY" --limit 1000 \
                     --json tagName,createdAt --jq '.[] | [.tagName, .createdAt] | @tsv')
          echo "removed $REMOVED stale release(s)"

      - name: Prune legacy Pages takeouts (docs/) older than 7 days
        run: |
          set -euo pipefail
          shopt -s nullglob
          NOW=$(date -u +%s)
          REMOVED=0
          for dir in docs/*/; do
            marker="${dir}published-at.txt"
            [ -f "$marker" ] || continue
            ts=$(head -1 "$marker" | tr -d '\r\n')
            published=$(date -u -d "$ts" +%s 2>/dev/null || echo 0)
            [ "$published" -gt 0 ] || continue
            age_days=$(( (NOW - published) / 86400 ))
            if [ "$age_days" -ge 7 ]; then
              echo "removing $dir (age ${age_days}d, published $ts)"
              git rm -rqf "$dir"
              REMOVED=$((REMOVED + 1))
            fi
          done
          if [ "$REMOVED" -gt 0 ]; then
            git config user.email "actions@github.com"
            git config user.name  "workshop-takeouts cleanup"
            git commit -m "Auto-expire $REMOVED legacy takeout(s) older than 7 days"
            git push
          fi
          echo "removed $REMOVED legacy docs takeout(s)"
