<h1>workshop-takeouts</h1>
<p>This site hosts ephemeral workshop takeout ZIPs.</p>
<p>Each ZIP lives at <code>/&lt;slug&gt;-&lt;date&gt;/&lt;file&gt;.zip</code> and auto-expires <strong>7 days</strong> after publish.</p>
<p>If you arrived here without a direct download link, ask the workshop trainer for your link.</p>
